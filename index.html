<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MEMA 🌸✨ – A Regency Romance Visual Novel</title>
    <meta name="description" content="Every Choice Rewrites the Heart – a premium interactive story game.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-root" class="scene fade-in">
        <!-- Header -->
        <header id="header" class="header">
            <h1 class="title">MEMA 🌸✨</h1>
            <button id="settings-btn" class="icon-btn" aria-label="Settings"><span class="icon">⚙️</span></button>
        </header>
        <!-- Main Content -->
        <main id="main" class="main-content">
            <!-- Dynamic scene will be injected here -->
        </main>
        <!-- Footer for stat bars -->
        <footer id="footer" class="footer">
            <div id="stats-bar" class="stats-bar"></div>
        </footer>
    </div>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal-content">
            <h2 id="settings-title">Settings</h2>
            <label><input type="checkbox" id="toggle-music" checked> Music</label>
            <label><input type="checkbox" id="toggle-sfx" checked> Sound Effects</label>
            <label><input type="checkbox" id="toggle-animations" checked> Animations</label>
            <label>Theme: <select id="theme-select"><option value="light">Light Romantic</option><option value="dark">Night Romance</option></select></label>
            <label>Text Speed: <input type="range" id="text-speed" min="30" max="200" step="10" value="50"></label>
            <button id="close-settings" class="btn">Close</button>
        </div>
    </div>
    <script type="module" src="config.js"></script>
    <script type="module" src="utils.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="dialogue.js"></script>
    <script type="module" src="choices.js"></script>
    <script type="module" src="relationships.js"></script>
    <script type="module" src="progress.js"></script>
    <script type="module" src="chapters.js"></script>
    <script type="module" src="endings.js"></script>
    <script type="module" src="music.js"></script>
    <script type="module" src="achievements.js"></script>
    <script type="module" src="save.js"></script>
    <script type="module" src="settings.js"></script>
    <script type="module" src="mobile.js"></script>
</body>
</html>
